name: Deploy WordPress

on:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Valider docker-compose
        env:
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_ROOT_PASSWORD: ${{ secrets.DB_ROOT_PASSWORD }}
        run: |
          docker compose -f docker/docker-compose.yml config

      - name: Valider docker-compose test
        env:
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_ROOT_PASSWORD: ${{ secrets.DB_ROOT_PASSWORD }}
        run: |
          docker compose -f docker/docker-compose.test.yml config

  smoke-test:
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Lancer environnement de test
        env:
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_ROOT_PASSWORD: ${{ secrets.DB_ROOT_PASSWORD }}
        run: |
          docker compose -f docker/docker-compose.test.yml up -d
          sleep 30

      - name: Smoke test - vérifier WordPress
        run: |
          curl -f http://localhost:8081 || exit 1

      - name: Smoke test - vérifier MySQL
        env:
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
        run: |
          docker compose -f docker/docker-compose.test.yml exec -T db-test mysqladmin ping -u wordpress -p$DB_PASSWORD || exit 1

      - name: Arrêter environnement de test
        run: |
          docker compose -f docker/docker-compose.test.yml down

  publish:
    runs-on: ubuntu-latest
    needs: smoke-test
    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Connexion Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build et push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: hajardh01/wordpress-asd:latest