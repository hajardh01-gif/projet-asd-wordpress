global:
  smtp_smarthost: 'smtp.gmail.com:587'
  smtp_from: 'votre.email@gmail.com'
  smtp_auth_username: 'votre.email@gmail.com'
  smtp_auth_password: 'Hajardouhab@2026'

route:
  group_by: ['alertname']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 1h
  receiver: 'email-alerts'

receivers:
  - name: 'email-alerts'
    email_configs:
      - to: 'votre.email@gmail.com'
        subject: '🚨 Alerte Petit Journal — {{ .GroupLabels.alertname }}'
        body: |
          {{ range .Alerts }}
          Alerte : {{ .Annotations.summary }}
          Description : {{ .Annotations.description }}
          Sévérité : {{ .Labels.severity }}
          {{ end }}